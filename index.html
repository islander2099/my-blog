<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="generator-container">
        <header class="main-header">
            <h1>💎 프리미엄 로또 번호 생성</h1>
            <p>빅데이터와 AI 알고리즘을 기반으로 최적의 조합을 추천합니다.</p>
        </header>

        <main class="generator-core">
            <section class="settings-panel">
                <div class="settings">
                    <div class="setting-item">
                        <label for="min-sum">최소 총합</label>
                        <input type="number" id="min-sum" value="100">
                    </div>
                    <div class="setting-item">
                        <label for="max-sum">최대 총합</label>
                        <input type="number" id="max-sum" value="200">
                    </div>
                    <div class="setting-item checkbox-item">
                        <input type="checkbox" id="include-bonus" checked>
                        <label for="include-bonus">보너스 번호 포함</label>
                    </div>
                </div>
                 <button id="generate-btn">GENERATE NEW NUMBERS</button>
            </section>

            <section class="results-panel">
                <div id="results-container">
                    <h2>AI 추천 번호</h2>
                    <div id="lotto-games"></div>
                </div>
                <div id="analysis-container">
                    <h2>데이터 분석</h2>
                    <div class="analysis-box">
                        <h3>🔥 HOT (Top 10)</h3>
                        <div id="hot-numbers" class="number-display"></div>
                    </div>
                    <div class="analysis-box">
                        <h3>❄️ COLD (Bottom 10)</h3>
                        <div id="cold-numbers" class="number-display"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
